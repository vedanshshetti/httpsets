name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: npm run build

      - name: Test
        id: test
        run: npm run test:node

      - name: PostTest (success)
        if: success()
        run: echo "Tests passed!"

      - name: PostTest (failure)
        if: failure()
        run: echo "Tests failed!"
